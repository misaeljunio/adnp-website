<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="ADNP Logo">
  <!-- Black background circle -->
  <circle cx="100" cy="100" r="100" fill="#0D0D0D"/>

  <!-- Dove (Holy Spirit symbol) -->
  <g transform="translate(100,62) scale(0.9)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="22" ry="13" fill="white" transform="rotate(-15)"/>
    <!-- Head -->
    <circle cx="20" cy="-10" r="8" fill="white"/>
    <!-- Beak -->
    <polygon points="27,-10 35,-8 27,-6" fill="#DBC19C"/>
    <!-- Wing (upper) -->
    <path d="M-5,-2 C-20,-20 -35,-18 -38,-8 C-30,-6 -18,-4 -5,-2Z" fill="white" opacity="0.9"/>
    <!-- Wing (lower) -->
    <path d="M-5,2 C-20,18 -38,16 -40,8 C-30,6 -18,4 -5,2Z" fill="white" opacity="0.75"/>
    <!-- Tail feathers -->
    <path d="M-22,-4 C-34,-2 -36,6 -28,8 C-24,4 -22,0 -22,-4Z" fill="white"/>
    <!-- Eye -->
    <circle cx="21" cy="-11" r="2" fill="#0D0D0D"/>
  </g>

  <!-- "ADNP" text in white -->
  <text
    x="100"
    y="128"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="38"
    font-weight="700"
    fill="white"
    letter-spacing="6"
  >ADNP</text>

  <!-- Thin divider line -->
  <line x1="50" y1="140" x2="150" y2="140" stroke="#DBC19C" stroke-width="0.8" opacity="0.6"/>

  <!-- "46 anos" text in cream -->
  <text
    x="100"
    y="162"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="17"
    font-weight="400"
    fill="#DBC19C"
    letter-spacing="3"
  >46 anos</text>
</svg>
